/* ════════════════════════════════════════════
   WEBUS FINAL — Light Blue + Coral Palette
   Primary:   #E8736B (Coral — from Fuji sky)
   Accent:    #D4574A (Deep crimson)
   Blue-1:    #EBF4FF (Very light blue bg)
   Blue-2:    #DBEAFE (Light blue surface)
   Blue-3:    #BFDBFE (Medium light blue)
   Blue-4:    #93C5FD (Soft blue accent)
   Blue-dark: #1E40AF (Deep blue for text)
   Blue-mid:  #3B82F6 (Medium blue)
   Ink:       #1E293B (Dark text)
════════════════════════════════════════════ */
:root{
  --coral:#E8736B;
  --crimson:#D4574A;
  --bg:#EBF4FF;
  --surface:#F0F7FF;
  --card:#FFFFFF;
  --blue1:#EBF4FF;
  --blue2:#DBEAFE;
  --blue3:#BFDBFE;
  --blue4:#93C5FD;
  --bluemid:#3B82F6;
  --bluedark:#1E40AF;
  --ink:#1E293B;
  --mid:#475569;
  --light:#94A3B8;
  --border:#C3DAFE;
  --shadow:0 4px 24px rgba(59,130,246,0.1);
  --shadow-lg:0 12px 48px rgba(59,130,246,0.16);
  --r:16px;--rsm:10px;--rlg:24px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);overflow-x:hidden;}
h1,h2,h3,h4{font-family:'Outfit',sans-serif;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--blue2);}
::-webkit-scrollbar-thumb{background:linear-gradient(var(--crimson),var(--coral));border-radius:3px;}

/* GRADIENT TEXT */
.gt{background:linear-gradient(135deg,var(--crimson),var(--coral));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.gtb{background:linear-gradient(135deg,var(--bluemid),var(--bluedark));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

/* BUTTONS */
.bp{background:linear-gradient(135deg,var(--crimson),var(--coral));color:#fff;font-family:'Outfit',sans-serif;font-weight:700;border:none;cursor:pointer;transition:all .28s;box-shadow:0 4px 18px rgba(212,87,74,.3);}
.bp:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(212,87,74,.45);}
.bb{background:linear-gradient(135deg,var(--bluemid),var(--bluedark));color:#fff;font-family:'Outfit',sans-serif;font-weight:700;border:none;cursor:pointer;transition:all .28s;box-shadow:0 4px 18px rgba(59,130,246,.25);}
.bb:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(59,130,246,.4);}
.bo{background:transparent;border:2px solid var(--coral);color:var(--coral);font-family:'Outfit',sans-serif;font-weight:600;cursor:pointer;transition:all .28s;}
.bo:hover{background:var(--coral);color:#fff;transform:translateY(-2px);}
.bob{background:transparent;border:2px solid var(--bluemid);color:var(--bluemid);font-family:'Outfit',sans-serif;font-weight:600;cursor:pointer;transition:all .28s;}
.bob:hover{background:var(--bluemid);color:#fff;transform:translateY(-2px);}
.bw{background:#fff;color:var(--crimson);font-family:'Outfit',sans-serif;font-weight:700;border:none;cursor:pointer;transition:all .28s;box-shadow:0 4px 16px rgba(0,0,0,.1);}
.bw:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.15);}

/* CARDS */
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);border:1px solid var(--border);transition:all .3s;}
.card:hover{transform:translateY(-5px);box-shadow:var(--shadow-lg);}
.gc{background:rgba(255,255,255,.82);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.7);border-radius:var(--rlg);box-shadow:0 8px 32px rgba(59,130,246,.08),inset 0 1px 0 rgba(255,255,255,.9);transition:all .35s;}
.gc:hover{transform:translateY(-6px);box-shadow:0 20px 60px rgba(59,130,246,.14),inset 0 1px 0 rgba(255,255,255,.95);}

/* SECTION TAG */
.stag{display:inline-flex;align-items:center;gap:7px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);color:var(--bluemid);border-radius:999px;padding:5px 16px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;font-family:'DM Sans',sans-serif;font-weight:600;}

/* INPUTS */
input,textarea,select{background:#fff;border:1.5px solid var(--border);border-radius:var(--rsm);padding:12px 16px;color:var(--ink);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;width:100%;transition:border .2s,box-shadow .2s;box-shadow:0 2px 8px rgba(59,130,246,.06);}
input:focus,textarea:focus,select:focus{border-color:var(--bluemid);box-shadow:0 0 0 3px rgba(59,130,246,.12);}
input::placeholder,textarea::placeholder{color:var(--light);}
select option{color:var(--ink);background:#fff;}
label{font-size:13px;font-weight:600;color:var(--mid);margin-bottom:6px;display:block;}

/* FADE IN */
.fi{opacity:0;transform:translateY(28px);transition:all .7s ease;}
.fi.vis{opacity:1;transform:none;}

/* DASHBOARD */
.dc{background:#fff;border-radius:var(--r);border:1px solid var(--border);box-shadow:0 2px 12px rgba(59,130,246,.07);padding:22px;}
.si{display:flex;align-items:center;gap:12px;padding:11px 16px;border-radius:10px;cursor:pointer;transition:all .2s;font-size:14px;font-weight:500;color:var(--mid);}

.sb{border-radius:999px;padding:3px 12px;font-size:11px;font-weight:700;font-family:'DM Sans',sans-serif;}

/* ANIMATIONS */
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes float2{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-8px) rotate(1deg)}}
@keyframes glow-coral{0%,100%{box-shadow:0 0 18px rgba(212,87,74,.3)}50%{box-shadow:0 0 38px rgba(212,87,74,.6)}}
@keyframes glow-blue{0%,100%{box-shadow:0 0 18px rgba(59,130,246,.25)}50%{box-shadow:0 0 38px rgba(59,130,246,.5)}}
@keyframes spin-s{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes wglow{0%,100%{box-shadow:0 0 18px rgba(37,211,102,.4)}50%{box-shadow:0 0 36px rgba(37,211,102,.7)}}
@keyframes sc-in{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes fu{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes drift{0%{transform:translateY(0) translateX(0);opacity:.7}100%{transform:translateY(-90px) translateX(var(--dx,20px));opacity:0}}
@keyframes pulse-ring{0%{transform:scale(1);opacity:.6}100%{transform:scale(2.2);opacity:0}}

/* ═══ STAR CANVAS ═══ */
function Stars({n=120}){
  const ref=useRef();
  useEffect(()=>{
    const c=ref.current;if(!c)return;
    const ctx=c.getContext("2d");
    let W=c.width=c.offsetWidth||window.innerWidth,H=c.height=c.offsetHeight||600;
    const stars=Array.from({length:n},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.6+.3,o:Math.random()*.55+.15,s:Math.random()*.45+.1}));
    let raf;
    const draw=()=>{ctx.clearRect(0,0,W,H);stars.forEach(s=>{ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(147,197,253,${s.o})`;ctx.fill();s.y-=s.s;if(s.y<0){s.y=H;s.x=Math.random()*W;}});raf=requestAnimationFrame(draw);};
    draw();const rs=()=>{W=c.width=c.offsetWidth;H=c.height=c.offsetHeight;};window.addEventListener("resize",rs);
    return()=>{cancelAnimationFrame(raf);window.removeEventListener("resize",rs);};
  },[]);
  return<canvas ref={ref} style={{position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none",opacity:.55}}/>;
}

/* ═══ OBSERVER ═══ */
function useObs(){
  useEffect(()=>{
    const ob=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add("vis");}),{threshold:.08});
    document.querySelectorAll(".fi:not(.vis)").forEach(el=>ob.observe(el));
    return()=>ob.disconnect();
  });
}

        <div key={t.id} className={`si ${tab===t.id?"act":""}`} style={{margin:"2px 8px"}} onClick={()=>{setTab(t.id);onClose&&onClose();}}>

              {myProj.notes&&(

                {[["Deadline",myProj.deadline||"TBD"],["Stage",myProj.stage],["Domain",myClient?.domain||"—"],["Hosting",myClient?.hosting||"—"]].map(([l,v])=>(

                  </div>
                ))}
              </div>
              <div className="dc">
                <div style={{fontSize:11,color:"var(--bluemid)",fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:12}}>💰 Payment Summary</div>
                {myPay?[["Total",`${myPay.cur}${myPay.amount.toLocaleString()}`,"var(--ink)"],["Paid",`${myPay.cur}${myPay.paid.toLocaleString()}`,"#059669"],["Remaining",`${myPay.cur}${(myPay.amount-myPay.paid).toLocaleString()}`,myPay.amount-myPay.paid>0?"#DC2626":"#059669"],["Status",myPay.status,"var(--bluemid)"]].map(([l,v,c])=>(
                  <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid var(--border)"}}>
                    <span style={{fontSize:13,color:"var(--mid)"}}>{l}</span><span style={{fontSize:13,fontWeight:700,color:c}}>{v}</span>

          <div style={{textAlign:"center",padding:"44px 20px",color:"var(--mid)"}}>
            <div style={{fontSize:48,marginBottom:12}}>🚧</div>
            <h3 style={{fontSize:18,fontWeight:700,marginBottom:8,color:"var(--ink)"}}>Project Not Started Yet</h3>
            <p style={{fontSize:14,marginBottom:16}}>Your project will appear here once Webus begins work. Contact us to get started!</p>
            <a href="https://wa.me/8801700000000" target="_blank" rel="noreferrer" className="bp" style={{display:"inline-flex",padding:"11px 24px",borderRadius:10,fontSize:14,textDecoration:"none"}}>💬 Chat with Us</a>
          </div>
        )}
      </div>
    ),
    pay:(
      <div>
        <h1 style={{fontSize:24,fontWeight:800,color:"var(--ink)",marginBottom:20}}>My Payments</h1>
        {myPay?(
          <>
            <div style={{background:"linear-gradient(135deg,#3B82F6,#1E40AF)",borderRadius:18,padding:"24px 22px",color:"#fff",marginBottom:18,boxShadow:"0 8px 28px rgba(59,130,246,.3)"}}>
              <div style={{fontSize:12,fontWeight:600,opacity:.8,marginBottom:4}}>Invoice {myPay.id}</div>
              <div style={{fontSize:38,fontWeight:900,fontFamily:"'Outfit',sans-serif",marginBottom:4}}>{myPay.cur}{myPay.amount.toLocaleString()}</div>
              <div style={{fontSize:13,opacity:.7,marginBottom:14}}>Total project amount</div>
              <div style={{display:"flex",gap:22,flexWrap:"wrap"}}>
                {[["PAID",`${myPay.cur}${myPay.paid.toLocaleString()}`],["REMAINING",`${myPay.cur}${(myPay.amount-myPay.paid).toLocaleString()}`],["STATUS",myPay.status]].map(([l,v])=>(
                  <div key={l}><div style={{fontSize:10,opacity:.6,marginBottom:2}}>{l}</div><div style={{fontSize:18,fontWeight:800}}>{v}</div></div>
                ))}
              </div>
            </div>
            {myPay.status==="Paid"?(
              <div style={{background:"rgba(16,185,129,.06)",border:"1px solid rgba(16,185,129,.2)",borderRadius:12,padding:"13px 18px",display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:22}}>✅</span><div style={{fontSize:14,fontWeight:600,color:"#059669"}}>All payments completed. Thank you!</div>
              </div>
            ):(
              <div style={{background:"var(--blue2)",border:"1.5px dashed var(--blue4)",borderRadius:14,padding:"16px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
                <div>
                  <div style={{fontSize:14,fontWeight:700,color:"var(--ink)",marginBottom:2}}>Outstanding: {myPay.cur}{(myPay.amount-myPay.paid).toLocaleString()}</div>
                  <div style={{fontSize:13,color:"var(--mid)"}}>Contact us via WhatsApp to complete payment</div>
                </div>
                <a href="https://wa.me/8801700000000" target="_blank" rel="noreferrer" style={{padding:"10px 20px",borderRadius:9,fontSize:14,textDecoration:"none",background:"#25D366",color:"#fff",fontFamily:"'Outfit',sans-serif",fontWeight:700}}>💬 Pay via WhatsApp</a>
              </div>
            )}
          </>
        ):(
          <div style={{textAlign:"center",padding:"40px 20px",color:"var(--mid)"}}>
            <div style={{fontSize:40,marginBottom:12}}>💳</div>
            <p style={{fontSize:14}}>No payment records yet.</p>
          </div>
        )}
      </div>
    ),
    support:(
      <div>
        <h1 style={{fontSize:24,fontWeight:800,color:"var(--ink)",marginBottom:20}}>Support</h1>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:20}} className="g2">
          <a href="https://wa.me/8801700000000" target="_blank" rel="noreferrer" style={{textDecoration:"none"}}>
            <div style={{background:"linear-gradient(135deg,#25D366,#1da851)",borderRadius:16,padding:"22px 18px",color:"#fff",cursor:"pointer",boxShadow:"0 8px 24px rgba(37,211,102,.25)",transition:"transform .2s"}}
              onMouseOver={e=>e.currentTarget.style.transform="translateY(-3px)"} onMouseOut={e=>e.currentTarget.style.transform="none"}>
              <div style={{fontSize:30,marginBottom:8}}>💬</div>
              <h3 style={{fontWeight:800,marginBottom:3,fontFamily:"'Outfit',sans-serif"}}>WhatsApp</h3>
              <p style={{fontSize:13,opacity:.85}}>Fastest — reply within 1 hour</p>
            </div>
          </a>
          <a href="mailto:hello@webus.agency" style={{textDecoration:"none"}}>
            <div style={{background:"linear-gradient(135deg,#3B82F6,#1E40AF)",borderRadius:16,padding:"22px 18px",color:"#fff",cursor:"pointer",boxShadow:"0 8px 24px rgba(59,130,246,.25)",transition:"transform .2s"}}
              onMouseOver={e=>e.currentTarget.style.transform="translateY(-3px)"} onMouseOut={e=>e.currentTarget.style.transform="none"}>
              <div style={{fontSize:30,marginBottom:8}}>✉️</div>
              <h3 style={{fontWeight:800,marginBottom:3,fontFamily:"'Outfit',sans-serif"}}>Email</h3>
              <p style={{fontSize:13,opacity:.85}}>hello@webus.agency</p>
            </div>
          </a>
        </div>
        <div className="dc">
          <h3 style={{fontSize:15,fontWeight:700,color:"var(--ink)",marginBottom:14}}>Send a Message</h3>
          <div style={{display:"grid",gap:12}}>
            <div><label>Subject</label><input placeholder="What do you need help with?"/></div>
            <div><label>Message</label><textarea placeholder="Describe your question or issue..." rows={4} style={{resize:"none"}}/></div>
          </div>
          <button className="bb" style={{padding:"11px 26px",borderRadius:10,fontSize:14,marginTop:14}}>Send Message</button>

  return(
    <div style={{display:"flex",minHeight:"100vh",background:"var(--bg)"}}>
      <div style={{width:212,background:"#fff",borderRight:"1px solid var(--border)",flexShrink:0,position:"fixed",top:0,left:0,bottom:0,zIndex:100,overflowY:"auto",boxShadow:"2px 0 12px rgba(59,130,246,.07)"}} className="hm">
        <Sidebar/>
      </div>
      {mob&&(
        <div style={{position:"fixed",inset:0,zIndex:200,background:"rgba(0,0,0,.38)"}} onClick={()=>setMob(false)}>
          <div style={{width:230,height:"100%",background:"#fff",boxShadow:"4px 0 30px rgba(0,0,0,.12)",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
            <Sidebar onClose={()=>setMob(false)}/>
          </div>
        </div>
      )}
      <div style={{flex:1,marginLeft:212,display:"flex",flexDirection:"column"}} className="cli">
        <style>{`@media(max-width:768px){.cli{margin-left:0!important;}}`}</style>
        <div style={{background:"#fff",borderBottom:"1px solid var(--border)",padding:"0 22px",height:62,display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:50,boxShadow:"0 2px 8px rgba(59,130,246,.07)"}}>
          <div style={{display:"flex",alignItems:"center",gap:9}}>
            <button className="hmb3" onClick={()=>setMob(true)} style={{display:"none",background:"var(--blue2)",border:"1px solid var(--border)",borderRadius:8,padding:"6px 9px",cursor:"pointer",fontSize:18,color:"var(--bluemid)"}}>☰</button>
            <style>{`@media(max-width:768px){.hmb3{display:flex!important;}}`}</style>
            <span style={{fontSize:14,fontWeight:600,color:"var(--ink)"}}>{user?.name}</span>
            <span style={{background:"rgba(59,130,246,.1)",border:"1px solid rgba(59,130,246,.25)",color:"var(--bluemid)",borderRadius:999,padding:"2px 10px",fontSize:10,fontWeight:700,letterSpacing:1,textTransform:"uppercase"}}>Client</span>
          </div>
          <button onClick={()=>{logout();nav("home");}} style={{background:"rgba(220,38,38,.07)",border:"1px solid rgba(220,38,38,.18)",borderRadius:8,padding:"7px 14px",color:"#DC2626",cursor:"pointer",fontSize:12,fontWeight:600}}>Logout</button>
        </div>
        <div style={{padding:"24px",flex:1,maxWidth:820}}>{panels[tab]}</div>
      </div>
    </div>
  );
}

/* ═══ APP ROOT ═══ */
function Public({nav}){
  return(
    <div>
      <Nav nav={nav}/>
      <Hero nav={nav}/>
      <Services/>
      <Portfolio/>
      <Pricing/>
      <Process/>
      <Testimonials/>
      <About/>
      <Contact/>
      <Footer nav={nav}/>
      <a href="https://wa.me/8801700000000" target="_blank" rel="noreferrer"
        style={{position:"fixed",bottom:24,right:24,zIndex:999,width:54,height:54,borderRadius:"50%",background:"#25D366",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,animation:"wglow 2s infinite",textDecoration:"none",boxShadow:"0 4px 20px rgba(37,211,102,.4)"}}>
        💬
      </a>
    </div>
  );
}

function AppCore(){
  const {user}=useAuth();
  const [page,setPage]=useState(()=>{
    if(user?.role==="admin")return"admin";
    if(user?.role==="client")return"client";
    return"home";
  });
  const nav=useCallback((p)=>{
    if(p==="admin"&&user?.role!=="admin"){setPage("login");return;}
    if(p==="client"&&user?.role!=="client"){setPage("login");return;}
    setPage(p);window.scrollTo(0,0);
  },[user]);
  if(page==="home")return<Public nav={nav}/>;
  if(page==="login")return<Login nav={p=>{setPage(p);window.scrollTo(0,0);}}/>;
  if(page==="admin")return user?.role==="admin"?<Admin nav={nav}/>:<Login nav={p=>setPage(p)}/>;
  if(page==="client")return user?.role==="client"?<Client nav={nav}/>:<Login nav={p=>setPage(p)}/>;
  return<Public nav={nav}/>;
}

function App(){return<AuthProvider><AppCore/></AuthProvider>;}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
